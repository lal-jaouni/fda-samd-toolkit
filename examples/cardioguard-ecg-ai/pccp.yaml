# CardioGuard ECG-AI: Predetermined Change Control Plan (PCCP) Configuration
# This YAML configuration is input to the PCCP generator to produce a structured
# submission document aligned with FDA December 2024 guidance.

device_info:
  name: "CardioGuard ECG-AI"
  manufacturer: "CardioGuard Medical, Inc."
  manufacturer_address: "100 Cardiology Drive, Cambridge, MA 02139"
  device_id: "3007625401"
  class: "Class II"
  predicate_device: "Anumana ECG-AI (K232488)"
  classification_panel: "Cardiovascular"
  intended_use: >
    CardioGuard ECG-AI is a software-as-a-medical-device intended to assist
    primary care and urgent care clinicians in the detection and characterization
    of atrial fibrillation, ventricular tachycardia, and 1st degree
    atrioventricular block from 12-lead electrocardiogram (ECG) recordings in
    ambulatory adult patients (age >= 18 years) presenting with signs or symptoms
    of cardiac arrhythmia.

  indications_for_use: >
    CardioGuard ECG-AI is indicated for use in ambulatory primary care and urgent
    care settings for detection of atrial fibrillation, ventricular tachycardia,
    and 1st degree AV block from 12-lead ECG in adult patients (18 years and older)
    with signs or symptoms suggestive of arrhythmia.

  submission_date: "2026-10-15"
  pccp_effective_date: "2026-10-15"
  document_version: "1.0"

# Section 1: Device Characteristics and Algorithm Specifications
algorithm_specifications:
  algorithm_type: "Deep Learning - Transformer-based Neural Network"
  input_specifications:
    input_format: "12-lead ECG signal"
    signal_duration_seconds: 10
    sampling_rate_hz: 500
    total_samples_per_recording: 60000
    preprocessing: >
      Input signals are zero-mean normalized (subtract mean, divide by standard deviation)
      independently for each lead. Baseline drift removed with high-pass filter
      (cutoff frequency: 0.5 Hz). Powerline noise removed with 50/60 Hz notch filter.

  output_specifications:
    output_type: "Probability scores and confidence intervals"
    output_classes:
      - name: "Atrial Fibrillation"
        probability_range: [0, 1]
      - name: "Ventricular Tachycardia"
        probability_range: [0, 1]
      - name: "1st Degree AV Block"
        probability_range: [0, 1]
      - name: "Normal Sinus Rhythm"
        probability_range: [0, 1]
    decision_threshold: 0.70
    confidence_interval_method: "Softmax probability variance"

  architecture_summary: >
    The model uses a transformer-based encoder architecture:
    1. Input normalization layer
    2. Convolutional feature extractor (3 layers, 16->32->64 filters, kernel size 3)
    3. Positional encoding for temporal positions
    4. Multi-head self-attention transformer encoder (8 attention heads, 256 hidden dims, 4 layers)
    5. Global average pooling
    6. Classification head (FC 256->128->4 with ReLU and softmax)
    Total trainable parameters: 2.3M

  architecture_rationale: >
    The transformer architecture was selected because:
    (1) Self-attention mechanisms learn to focus on diagnostically relevant patterns
        (e.g., irregular RR intervals in AFib, wide QRS complexes in VT)
    (2) Multi-head attention captures multiple independent feature relationships simultaneously
    (3) Positional encoding preserves temporal structure of 10-second ECG recording
    (4) No recurrent structures, enabling efficient parallel computation
    (5) Successfully deployed in prior ECG analysis work (Anumana, 2021; K232488)

# Section 2: Baseline Performance Characteristics
baseline_performance:
  clinical_validation_study: >
    Retrospective, double-blinded, multi-site clinical validation across
    3 major US health systems (Johns Hopkins, Stanford Health, Mayo Clinic).
    1500 adult patients (18+ years), board-certified cardiologist adjudication.

  study_dates: "2025-01-01 to 2026-06-30"
  study_sample_size: 1500

  primary_endpoint: >
    AUROC >= 0.90 with 95% confidence interval lower bound >= 0.87.
    Achieved: AUROC 0.92 (95% CI: 0.89-0.94).

  overall_performance:
    auroc: 0.92
    auroc_ci_lower: 0.89
    auroc_ci_upper: 0.94
    sensitivity: 0.88
    specificity: 0.92
    ppv: 0.90
    npv: 0.91

  subpopulation_performance:
    by_age:
      - age_group: "18-40 years"
        n: 300
        auroc: 0.91
        sensitivity: 0.85
        specificity: 0.91
      - age_group: "41-65 years"
        n: 750
        auroc: 0.95
        sensitivity: 0.90
        specificity: 0.94
      - age_group: "66+ years"
        n: 450
        auroc: 0.94
        sensitivity: 0.89
        specificity: 0.92

    by_sex:
      - sex: "Male"
        n: 780
        auroc: 0.93
        sensitivity: 0.88
        specificity: 0.93
      - sex: "Female"
        n: 720
        auroc: 0.91
        sensitivity: 0.88
        specificity: 0.90

    by_race_ethnicity:
      - group: "White"
        n: 900
        auroc: 0.94
        sensitivity: 0.90
        specificity: 0.93
      - group: "Black/African American"
        n: 300
        auroc: 0.91
        sensitivity: 0.86
        specificity: 0.91
      - group: "Hispanic/Latino"
        n: 180
        auroc: 0.92
        sensitivity: 0.87
        specificity: 0.92
      - group: "Asian American"
        n: 120
        auroc: 0.93
        sensitivity: 0.89
        specificity: 0.93

    race_ethnicity_gap_analysis: >
      A 0.03 AUROC difference exists between White (0.94) and Black (0.91) populations
      in the validation cohort. This difference is attributed to training data imbalance
      (60% White, 20% Black representation) and potential signal characteristic variations
      across equipment manufacturers. Mitigation: additional 50,000 ECGs from HBCU health
      systems in retraining pipeline. Re-validation planned for v1.1.

# Section 3: Data Management and Quality Assurance
data_management:
  training_data_overview: >
    The baseline model was trained on 250,000 ECG recordings collected from 5 major
    US health systems (2019-2023), representing 180,000 unique adult patients.
    Data includes all cardiac rhythms: 62% normal sinus, 21% atrial fibrillation,
    6% ventricular tachycardia, 7% 1st degree AV block, 4% other/excluded.

  data_sources:
    - name: "Health System A"
      location: "Northeast US"
      ecgs_contributed: 60000
      date_range: "2019-2023"
    - name: "Health System B"
      location: "West Coast US"
      ecgs_contributed: 65000
      date_range: "2019-2023"
    - name: "Health System C"
      location: "Midwest US"
      ecgs_contributed: 55000
      date_range: "2020-2023"
    - name: "Health System D"
      location: "Southeast US"
      ecgs_contributed: 40000
      date_range: "2021-2023"
    - name: "Health System E"
      location: "Southwest US"
      ecgs_contributed: 30000
      date_range: "2022-2023"

  data_quality_assurance_procedures:
    signal_integrity_checks: >
      Before inclusion in any training or validation dataset:
      (1) Verify all 12 leads present and contiguous
      (2) Confirm sampling rate is 500 Hz or higher
      (3) Check for missing or corrupted samples (data completeness > 99%)
      (4) Validate that signal duration is exactly 10 seconds (+/- 0.1 seconds)

    artifact_detection_exclusions: >
      (1) Baseline wander magnitude > 5 mV (excluded)
      (2) Electrode noise (RMS amplitude > 2 mV over 1-second windows, excluded)
      (3) Powerline interference (visible 50/60 Hz contamination, excluded)
      (4) Motion artifact (non-physiologic signal discontinuities, excluded)
      Automated artifact detection flag for manual review if borderline.

    label_validation: >
      All ECG rhythm annotations must be verified by at least one board-certified
      cardiologist employed by the contributing health system. Reference standard
      established as follows:
      (1) For hospitalized patients: electronic health record diagnosis + physician documentation
      (2) For ambulatory patients: clinical ECG interpretation note or device interrogation
      (3) For research cohorts: consensus of two independent cardiologists; if disagreement,
          third cardiologist adjudicates.
      Inter-rater reliability target: Fleiss kappa > 0.80 for arrhythmia classification.

    class_balance_verification: >
      Before any retraining epoch, the training dataset composition is verified:
      (1) Normal sinus rhythm: minimum 40%, maximum 70%
      (2) Atrial fibrillation: minimum 15%, maximum 30%
      (3) Ventricular tachycardia: minimum 5%, maximum 15%
      (4) 1st degree AV block: minimum 8%, maximum 18%
      If any class falls outside target range, sampling weights are adjusted or additional
      data is collected to restore balance.

    demographic_diversity_requirements: >
      Training data must maintain representation across:
      Age: 18-40 (10-20%), 41-65 (50-60%), 66+ (25-35%)
      Sex: Male (45-55%), Female (45-55%)
      Race/Ethnicity: White (50-70%), Black (15-25%), Hispanic (8-15%), Asian (5-12%), Other (2-8%)
      Comorbidities: Hypertension (40-60%), Diabetes (15-30%), Structural heart disease (10-20%)
      These targets are continuously monitored and reported in quarterly retraining summaries.

    temporal_diversity: >
      Training data must span at least 12 months to capture seasonal variations in
      arrhythmia presentation and ECG device usage patterns. No single calendar month
      should represent more than 10% of the training dataset.

# Section 4: Planned Modifications Under PCCP
planned_modifications:
  modification_1:
    type: "Model Retraining with New Data"
    description: >
      Periodic retraining of the CardioGuard ECG-AI model on newly collected ECG data
      from deployed health systems. The model architecture (transformer encoder + classification head)
      remains fixed. Only network weights are updated via gradient descent using the Adam optimizer.
      Input/output specifications and decision thresholds remain unchanged unless explicitly
      justified and documented.

    rationale: >
      New ECG data from diverse patient populations and evolving clinical presentations
      ensures the model maintains clinical relevance and performance over time. Periodic
      retraining addresses gradual data distribution shifts and improves generalization
      to underrepresented sub-populations. Retraining cycles allow incorporation of feedback
      from deployed users without requiring new 510(k) submissions, per FDA guidance.

    frequency: "Quarterly (every 3 calendar months)"

    affected_performance_metrics:
      - "AUROC (overall and per-class)"
      - "Sensitivity (per-class)"
      - "Specificity (per-class)"
      - "Subpopulation parity metrics (AUROC gap between demographic groups)"

    data_source: >
      ECG data collected from 3 partnered health systems during live deployment.
      Contribution targets: 50,000 new ECGs per year (12,500 per quarter).
      Data is de-identified and labeled by health system staff cardiologists prior
      to CardioGuard systems delivery for retraining.

    retraining_procedure: >
      (1) New data undergoes full QA pipeline (signal integrity, artifact detection,
          label validation, demographic stratification)
      (2) New data is combined with historical training data; composition verified against
          class balance and diversity requirements
      (3) Model is initialized from most recent baseline weights (transfer learning)
      (4) Training proceeds for fixed 100 epochs with early stopping (patience=10) on
          internal validation set AUROC
      (5) Learning rate starts at 0.0001 with exponential decay (0.95^epoch)
      (6) Batch size maintained at 128; all other hyperparameters fixed
      (7) Retraining validation set is held-out from the previous retraining cycle
          to ensure independent evaluation

    drift_monitoring_and_triggers:
      primary_trigger: >
        Retraining is triggered automatically if AUROC on internal validation set
        (measured monthly) decreases by >= 5% relative to most recent baseline model.
        For example: if baseline AUROC = 0.92, a drop to 0.874 (5% relative decrease)
        triggers retraining within 2 weeks.
      secondary_triggers:
        - "Sensitivity for any target arrhythmia drops >= 3% relative"
        - "Specificity drops >= 2% relative"
        - "AUROC gap between any two demographic groups exceeds 0.05"

      monitoring_cadence: >
        Monthly drift assessment using internal validation cohort (held-out from all
        training data). Metrics calculated on 1000-case rolling window to ensure adequate
        statistical power. Results reported internally; FDA notified every 12 months
        or immediately if drift triggers are exceeded.

    success_criteria:
      - "Retrained model AUROC >= 0.90 with 95% CI lower bound >= 0.87"
      - "Sensitivity >= 0.85 for each target arrhythmia"
      - "Specificity >= 0.90 overall"
      - "No demographic disparity (AUROC gap between groups <= 0.03)"

    documentation_requirements: >
      Each retraining cycle generates a Retraining Summary Report including:
      (1) Dates of retraining and validation periods
      (2) Training data composition (counts, demographics, class distribution)
      (3) Baseline and post-training model performance metrics
      (4) Subpopulation performance analysis
      (5) Any drift trigger events and mitigations
      (6) Clinical justification if thresholds not met
      Reports retained for regulatory inspection; key metrics submitted to FDA annually.

  modification_2:
    type: "Data Expansion and Demographic Rebalancing"
    description: >
      Incorporation of ECG data from additional health systems and patient populations
      to improve demographic representation and address identified performance gaps
      between sub-populations. Expansion targets specific demographics underrepresented
      in baseline training data (e.g., Black/African American, Asian American, pediatric
      precursor data).

    rationale: >
      The baseline training data shows a 0.03 AUROC gap between White and Black
      populations. Additional diverse data improves fairness, reduces algorithmic bias,
      and enhances clinical utility across all populations. Expanding data sources also
      captures equipment and signal characteristic variations across different hospital IT
      environments, improving real-world generalization.

    frequency: "Annually (every 12 calendar months)"

    target_expansion_scope:
      year_1_focus: >
        Recruit 2 historically Black college and university (HBCU) health systems
        to contribute 50,000 additional ECGs (25,000 per institution) over 12 months.
        Goal: increase Black/African American representation from 20% to 25% of training
        dataset.
      year_2_focus: >
        Recruit 1 Asian American-serving health system (West Coast) and 1 Hispanic/Latino
        community health center network to each contribute 30,000 ECGs.
        Goal: increase Asian representation to 12%, Hispanic to 15%.

    inclusion_criteria_for_expansion_data: >
      Same as baseline data:
      (1) Adult patients 18+ years
      (2) 12-lead ECG recording with sampling rate >= 500 Hz
      (3) Complete 10-second signal, signal quality > 95%
      (4) Rhythm annotation by board-certified cardiologist
      (5) De-identified, HIPAA-compliant

    affected_performance_metrics:
      - "AUROC (overall and per-class)"
      - "Demographic parity metrics (delta AUROC between groups)"
      - "Subpopulation sensitivity/specificity by age, sex, race/ethnicity"

    success_criteria:
      - "AUROC gap between any two demographic groups <= 0.02 (down from baseline 0.03)"
      - "Minimum AUROC of 0.92 across all demographic subgroups"
      - "Sensitivity >= 0.88 across all demographic subgroups"

    documentation_requirements: >
      Data expansion is documented in annual FDA pre-notification including:
      (1) New health system partners and ECG contribution volumes
      (2) Demographic composition of new data
      (3) Updated training dataset statistics (total n, class balance, demographics)
      (4) Post-expansion model performance on held-out validation cohort
      (5) Comparison of performance gaps before and after expansion

  modification_3:
    type: "Hyperparameter Optimization"
    description: >
      Fine-tuning of learning rate, batch size, dropout rates, weight decay, and
      early stopping patience within pre-defined ranges. Model architecture (transformer
      encoder, classification head) and algorithm remain unchanged. Hyperparameter
      optimization is performed using internal validation set performance to prevent
      overfitting.

    rationale: >
      Hyperparameter tuning can improve convergence speed, prevent overfitting, and
      maximize performance on new datasets without altering the fundamental model
      structure or requiring architectural modifications that would necessitate new
      510(k) submissions.

    frequency: "Every 6 months during major retraining cycles"

    allowed_hyperparameter_ranges:
      learning_rate: [0.00005, 0.0005]  # baseline 0.0001
      batch_size: [64, 256]  # baseline 128
      weight_decay: [0, 0.00005]  # baseline 1e-5
      dropout_rate: [0.1, 0.4]  # baseline 0.2
      early_stopping_patience: [5, 15]  # baseline 10 epochs
      learning_rate_decay_gamma: [0.9, 0.99]  # baseline 0.95

    optimization_procedure: >
      (1) Grid search over predefined hyperparameter ranges using validation set AUROC
      (2) Top 5 hyperparameter combinations tested with 5-fold cross-validation
      (3) Selected based on validation AUROC, secondary tiebreaker is inference latency
      (4) New hyperparameters applied in next quarterly retraining cycle

    affected_performance_metrics:
      - "AUROC (overall and per-class)"
      - "Training convergence speed"
      - "Validation loss"
      - "Inference latency (milliseconds)"

    success_criteria:
      - "No degradation in AUROC (maintained >= 0.90 with CI lower bound >= 0.87)"
      - "Training convergence within 150 epochs"
      - "Inference latency < 200 milliseconds"

    documentation_requirements: >
      Hyperparameter optimization results documented including:
      (1) Grid search results (top 10 parameter sets and corresponding AUROC)
      (2) Final selected hyperparameters with justification
      (3) Cross-validation performance metrics
      (4) Comparison to baseline model

# Section 5: Change Control and Governance
change_control_procedures:
  approval_authority: "CardioGuard Medical, Inc., Vice President of Clinical Affairs and Regulatory"

  review_requirements: >
    Before any planned modification is executed:
    (1) Clinical review: does change maintain or improve clinical safety/effectiveness?
    (2) Regulatory review: does change align with PCCP scope and FDA guidance?
    (3) Data quality review: is new training data QA procedure compliant?
    (4) Algorithm review: are modifications within allowed scope (weights-only, hyperparams)?

  documentation_procedures: >
    All changes documented in a Modification Log including:
    (1) Date of modification initiation and completion
    (2) Type of modification (retraining, data expansion, hyperparameter optimization)
    (3) Data source(s) and composition
    (4) Model performance before and after (AUROC, sensitivity, specificity)
    (5) Any drift triggers or alerts that prompted the change
    (6) Approving individuals and titles
    (7) Clinical/regulatory justification

  fda_notification_procedures: >
    (1) Quarterly retraining results: tracked internally, key metrics reported to FDA
        in annual pre-notification report (due within 30 days of each anniversary of
        device clearance)
    (2) Unplanned modifications (bug fixes, security patches): reported within 10 business
        days to FDA via 30-day notice if performance-related, or immediately if safety-critical
    (3) Discontinued modifications: if any planned modification is cancelled or
        substantially changed, FDA notified in next scheduled submission

# Section 6: Monitoring and Compliance
post-market_monitoring:
  real_world_performance_tracking: >
    Post-clearance, CardioGuard Medical will maintain a real-world performance database
    including:
    (1) All inferences performed in deployed health systems (de-identified)
    (2) Model prediction (probability scores)
    (3) Clinician action taken (accepted, rejected, overridden)
    (4) Patient outcomes when available (through EHR linkage or outcome registry)
    (5) Reported adverse events or near-misses

  performance_comparison_schedule:
    quarterly: >
      Internal monthly monitoring; quarterly summary of AUROC, sensitivity, specificity
      on internal validation set
    annual: >
      FDA pre-notification report including:
      (1) All modifications executed under PCCP in past 12 months
      (2) Drift monitoring results and any triggers exceeded
      (3) Real-world performance summary (if sufficient deployment data available)
      (4) Demographic equity analysis
      (5) Any adverse events, patient complaints, or safety signals

  trigger_for_escalation: >
    If any of the following occur, FDA notified immediately:
    (1) AUROC drops below 0.88 (primary endpoint threshold - 2%)
    (2) Sensitivity drops below 0.82 for any target arrhythmia (primary endpoint - 3%)
    (3) Patient harm event or adverse event with probable relation to model error
    (4) Cybersecurity vulnerability or breach affecting model integrity
    (5) Incorporation of training data later found to be mislabeled (>1% of training set)

# Section 7: Version Control and Archival
version_control:
  baseline_model_version: "v1.0_cleared_2026-10-15"
  model_architecture_hash: "sha256:4a8c9d2e7f1b5c3a6e9d2f0b4c8a1e5d"

  version_tracking: >
    Each retrained model version is tagged with:
    (1) Release date (YYYY-MM-DD)
    (2) Training dataset composition (n, class distribution, demographics)
    (3) Baseline AUROC achieved
    (4) All hyperparameters used
    (5) Cardiologist(s) reviewing results
    (6) Regulatory approval

  archival_procedures: >
    (1) All model weights, training scripts, and hyperparameter logs retained for 10 years
    (2) Training dataset versions and QA reports retained for 7 years
    (3) Modification logs and FDA correspondence retained for 10 years (per medical device
        record retention requirements)
    (4) Monthly performance monitoring reports retained for 3 years
