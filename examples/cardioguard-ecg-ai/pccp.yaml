# CardioGuard ECG-AI: Predetermined Change Control Plan (PCCP)
# FDA December 2024 guidance-aligned YAML configuration for 510(k) submission
# Retrospective validation study with prospective post-market surveillance plan

device_info:
  name: "CardioGuard ECG-AI"
  manufacturer: "CardioGuard Medical, Inc."
  intended_use: >
    CardioGuard ECG-AI is a software-as-a-medical-device intended to assist
    primary care and urgent care clinicians in the detection and characterization
    of atrial fibrillation, ventricular tachycardia, and 1st degree
    atrioventricular block from 12-lead electrocardiogram (ECG) recordings in
    ambulatory adult patients (age >= 18 years) presenting with signs or symptoms
    of cardiac arrhythmia. The device provides clinical decision support and is
    not intended as a standalone diagnostic tool.
  indications_for_use: >
    CardioGuard ECG-AI is indicated for use in ambulatory primary care and urgent
    care settings for detection of atrial fibrillation, ventricular tachycardia,
    and 1st degree AV block from 12-lead ECG in adult patients (18 years and older)
    with signs or symptoms suggestive of arrhythmia.
  classification: "Class II"
  predicate_device: "Anumana ECG-AI (K232488)"
  device_id: "3007625401"

planned_modifications:
  - type: "Model Retraining with New Data"
    description: >
      Quarterly retraining of the CardioGuard transformer-based deep learning
      classifier on newly collected ECG data from deployed health systems to
      maintain or improve sensitivity and specificity for arrhythmia detection.
      The model architecture (4-layer transformer with 8 attention heads, 256
      hidden dimensions) remains fixed; only weights are updated. Retraining
      includes data from all 5 health system sources plus new prospective
      collections.
    rationale: >
      New ECG data from diverse patient populations and geographic regions may
      contain previously unrepresented rhythm patterns or demographic characteristics.
      Periodic retraining with demographically balanced datasets improves model
      robustness and ensures sustained clinical performance across changing
      populations. Quarterly cycles align with standard post-market surveillance
      cadence and FDA PCCP expectations for AI/ML devices.
    affected_performance_metrics:
      - "AUROC overall"
      - "Sensitivity (AFib)"
      - "Sensitivity (VT)"
      - "Specificity overall"
      - "Demographic parity (AUROC gap across race/ethnicity)"
    frequency_cadence: "Quarterly (every 3 months or when drift thresholds exceeded)"

  - type: "Data Expansion and Demographic Rebalancing"
    description: >
      Incorporation of ECG signals from 2 additional HBCU (Historically Black
      Colleges and Universities) health systems and diverse patient demographics
      into training dataset. Targets 50,000 additional ECGs with focus on
      Black/African American population representation, reducing demographic
      imbalance from 60% White / 20% Black to ~50% White / 40% Black. Expansion
      includes representation across ages, sexes, and comorbidity profiles.
    rationale: >
      Training data analysis identified 0.03 AUROC gap between White (0.94) and
      Black/African American (0.91) validation cohorts, driven by training data
      imbalance (60% White vs. 20% Black). Targeted expansion from HBCU partners
      improves demographic balance, reduces algorithmic bias, and enables the
      model to generalize equitably across diverse populations. Addresses equity
      concerns central to FDA SaMD guidance and demonstrates post-market commitment
      to fairness.
    affected_performance_metrics:
      - "AUROC (Black/African American subgroup)"
      - "AUROC (Hispanic/Latino subgroup)"
      - "Demographic parity metrics"
      - "Sensitivity by race/ethnicity"
      - "Specificity by race/ethnicity"
    frequency_cadence: "Annual major retraining (target Q4 2026 for v1.1 with HBCU data)"

  - type: "Hyperparameter Optimization"
    description: >
      Adjustment of learning rate, batch size, dropout rates, class weights, and
      regularization parameters within pre-defined ranges during retraining cycles.
      Optimization performed using validation set performance. Transformer
      architecture and algorithm remain unchanged. Focus on maintaining or improving
      sensitivity in underrepresented demographic groups.
    rationale: >
      Hyperparameter tuning improves convergence and prevents overfitting on
      updated datasets without changing fundamental model structure. Specifically,
      class-weighted loss optimization can improve balance between AFib/VT
      detection (high sensitivity) and false positive reduction (specificity),
      critical for clinical adoption.
    affected_performance_metrics:
      - "AUROC (overall and by subgroup)"
      - "Sensitivity (AFib, VT)"
      - "Specificity (overall)"
      - "Validation loss convergence"
    frequency_cadence: "Every 6 months during retraining cycles"

modification_protocol:
  data_management: >
    ECG data collected from health system PACS and EHR systems via HL7 FHIR API
    endpoints or direct database connections. All data stored in HIPAA-compliant,
    access-controlled databases with encryption at rest and in transit. Patient
    identifiers removed and replaced with de-identified tokens. Each dataset
    versioned with unique identifier including source, date range, and ECG count.
    Data validated for completeness (all 12 leads present, >10 second duration,
    500 Hz sampling) before inclusion. Audit trails maintained for all data
    versions, sources, inclusions, and exclusions.

  data_quality_checks: >
    Automated artifact detection applied to all new data: baseline wander < 5 mV,
    electrode noise RMS < 2 mV, signal quality score > 95% for inclusion.
    Automated checks identify incomplete signals (missing leads), extreme values
    (saturation), timing inconsistencies. Manual review of flagged cases before
    inclusion. Demographic distribution analysis on each new batch (age, sex,
    race/ethnicity, rhythm distribution) compared to training data baseline.
    Approval required if new batch deviates >10% from expected demographic targets.

  retraining_methodology: >
    Retraining pipeline: (1) Data assembly from all approved sources, (2) Merge
    with previous training data for continuity, (3) Stratified random split into
    training (70%), validation (15%), test (15%) by rhythm class and demographic
    group, (4) Preprocessing (zero-mean normalization, filters, artifact removal),
    (5) Model training using original transformer architecture with class-weighted
    loss, (6) Hyperparameter tuning via validation set performance, (7) Final
    model evaluation on held-out test set. Training duration: 2-4 weeks depending
    on dataset size. GPU cluster (NVIDIA A100) used for efficiency.

  validation_strategy: >
    Prospective validation on held-out test set (15% of merged data, stratified
    by class and demographics). Primary endpoint: AUROC >= 0.90 overall. Secondary
    endpoints: Sensitivity >= 0.85, Specificity >= 0.90, subgroup AUROC gap <= 0.03.
    If any metric fails, automated alerts escalate to clinical team for root cause
    analysis before deployment. Comparison to baseline (v1.0 model) performed using
    McNemar test for sensitivity/specificity, DeLong test for AUROC. Non-inferiority
    margin: AUROC not more than 0.03 below baseline.

  validation_criteria:
    - "AUROC overall >= 0.90 (95% CI lower bound >= 0.87)"
    - "Sensitivity (AFib detection) >= 0.85"
    - "Sensitivity (VT detection) >= 0.82"
    - "Specificity (overall) >= 0.90"
    - "No demographic subgroup with AUROC gap > 0.03 vs. others"
    - "Positive predictive value >= 0.88"
    - "Negative predictive value >= 0.91"
    - "Confidence interval width < 0.06 (sufficient precision)"

  performance_thresholds:
    - name: "AUROC Overall"
      description: "Overall discrimination ability across all rhythm classes; critical for clinical utility"
      baseline_value: 0.92
      threshold_warning: 0.90
      threshold_action: 0.87
      direction: "higher"

    - name: "Sensitivity (AFib Detection)"
      description: "True positive rate for atrial fibrillation detection; missed diagnoses create stroke risk"
      baseline_value: 0.92
      threshold_warning: 0.90
      threshold_action: 0.85
      direction: "higher"

    - name: "Sensitivity (VT Detection)"
      description: "True positive rate for ventricular tachycardia; critical for sudden cardiac death prevention"
      baseline_value: 0.88
      threshold_warning: 0.85
      threshold_action: 0.80
      direction: "higher"

    - name: "Specificity Overall"
      description: "True negative rate; maintains low false positive rate to prevent unnecessary interventions"
      baseline_value: 0.92
      threshold_warning: 0.90
      threshold_action: 0.88
      direction: "higher"

    - name: "Demographic Parity (AUROC Gap)"
      description: "Maximum AUROC difference across demographic groups; ensures equitable performance across populations"
      baseline_value: 0.03
      threshold_warning: 0.04
      threshold_action: 0.05
      direction: "lower"

  drift_monitoring:
    method: >
      Statistical testing (DeLong for AUROC differences, McNemar for sensitivity/specificity)
      comparing recent performance (past 3 months) to baseline v1.0 validation cohort.
      Stratified analysis by age, sex, race/ethnicity to detect subgroup-specific drift.
    monitoring_frequency: "Quarterly (every 3 months) on newly collected ECGs from all deployed health systems"
    threshold_description: >
      Warning: AUROC drops >0.02 below baseline (0.92 → 0.90) or sensitivity drops >3%.
      Action: AUROC drops >0.05 below baseline (0.92 → 0.87), sensitivity drops >7%, or any demographic
      subgroup AUROC gap exceeds 0.03.
    response_protocol: >
      Warning-level alerts trigger root cause investigation (data drift, equipment changes, population shifts,
      model concept drift) within 2 weeks. Findings documented in quarterly FDA report. If drift confirmed,
      accelerated retraining initiated. Action-level alerts trigger immediate clinical review, potential deployment
      halt, and escalation to regulatory team. All action-level alerts reported to FDA within 10 business days.
      Annual comprehensive drift analysis and mitigation plans submitted to FDA.

  deployment_process: >
    Pre-deployment checklist: (1) Validation criteria all met (documented in
    validation report), (2) Safety review by clinical/regulatory team, (3) Risk
    assessment for retraining changes vs. baseline, (4) Integration testing with
    health system EHR/PACS systems, (5) Clinician training updated if behavior
    changes, (6) Audit trail setup for model versioning. Deployment strategy:
    Staged rollout to 1-2 health systems first, monitor for 2 weeks, then full
    deployment if no safety signals. Model versioning: Each retraining generates
    unique version identifier (e.g., v1.0.1, v1.0.2) with deployment timestamp.
    Fallback procedure: Previous model version maintained on servers for 30 days
    post-deployment.

impact_assessment:
  benefits: >
    CardioGuard ECG-AI retraining and demographic expansion deliver significant
    clinical and equity benefits: (1) Sustained performance: Quarterly retraining
    on new data maintains 0.92 AUROC as patient populations evolve, preventing
    gradual performance drift. (2) Equity advancement: Data expansion targeting
    HBCU partners and Black/African American patients reduces 0.03 AUROC gap to
    target <= 0.02, advancing health equity in arrhythmia detection. (3) Expanded
    clinical use: Broader demographic representation enables confident use across
    diverse US populations, reducing health disparities. (4) Regulatory compliance:
    Planned modifications align with FDA December 2024 PCCP guidance and AI/ML
    best practices.

  risks: >
    Planned modifications introduce several risks requiring mitigation: (1) Model
    degradation: Retraining on biased new data could reduce performance in
    underrepresented groups; mitigated by demographic stratification and parity
    monitoring. (2) Deployment delays: Quarterly retraining cycles could delay
    model updates if validation criteria not met; mitigated by parallelized
    training pipelines and pre-approved modification scope. (3) Safety signal
    misses: Drift monitoring may not detect rare failure modes; mitigated by
    clinician adverse event reporting and MedWatch integration. (4) Data quality
    degradation: New data sources may have different quality; mitigated by
    automated quality checks and manual oversight.

  risk_mitigations:
    - risk: "Retraining on new data with different distribution could degrade performance in underrepresented groups"
      mitigation: "Stratified sampling to maintain demographic balance; performance thresholds require no subgroup AUROC gap > 0.03; quarterly monitoring of all subgroups"

    - risk: "Hyperparameter changes could reduce sensitivity, missing critical arrhythmias"
      mitigation: "Validation strategy includes sensitivity thresholds (AFib >= 0.85, VT >= 0.82); test set evaluation before deployment; comparison to baseline using McNemar test"

    - risk: "Undetected data drift could degrade real-world performance post-deployment"
      mitigation: "Quarterly drift monitoring with automated alert triggers (warning at -0.02 AUROC, action at -0.05); root cause investigation protocol; FDA reporting within 10 business days for action-level alerts"

    - risk: "HBCU data expansion may introduce new failure modes specific to new patient populations"
      mitigation: "Pilot deployment to 1-2 sites first, 2-week monitoring period before full rollout; adverse event reporting mechanism; planned v1.2 refinement if issues identified"

    - risk: "Quarterly retraining cadence could miss urgent safety issues requiring immediate model adjustment"
      mitigation: "FDA pre-approval of modification scope allows ad-hoc retraining if safety signals identified; escalation pathway to regulatory team; documentation of any emergency modifications"

  sub_population_analysis:
    - name: "Age 18-40 years"
      description: "Younger adults with lower baseline arrhythmia prevalence; smaller training sample (14% of training data; n=300 validation)"
      performance_expectations: "AUROC 0.88-0.91 (slightly lower than older cohorts due to lower disease prevalence); sensitivity >= 0.85 maintained"
      monitoring_plan: "Quarterly AUROC/sensitivity assessment; alert if drops below 0.87 AUROC; enhanced clinical review for equivocal scores in this age group"

    - name: "Age 41-65 years"
      description: "Middle-aged adults; largest training sample (52% of training data; n=750 validation); target clinical population for AFib/VT"
      performance_expectations: "AUROC >= 0.92 (highest performance expected); sensitivity >= 0.88"
      monitoring_plan: "Quarterly assessment; treat as reference baseline for other subgroups; alert if AUROC drops below 0.90"

    - name: "Age 66+ years"
      description: "Older adults; high arrhythmia prevalence; frequent target patients (34% of training data; n=450 validation)"
      performance_expectations: "AUROC 0.91-0.94; sensitivity >= 0.87"
      monitoring_plan: "Quarterly assessment; special attention to comorbidities (HF, CKD) effects; alert if AUROC drops below 0.89"

    - name: "Male patients"
      description: "Sex-based analysis; 52% of training data (n=780 validation); generally higher VT prevalence"
      performance_expectations: "AUROC 0.93 (similar or slightly higher than female cohort); sensitivity >= 0.88"
      monitoring_plan: "Quarterly stratified analysis; alert if gap vs. female cohort exceeds 0.02 AUROC"

    - name: "Female patients"
      description: "Sex-based analysis; 48% of training data (n=720 validation); may have lower VT prevalence in training"
      performance_expectations: "AUROC 0.91 (slightly lower than male cohort due to lower VT prevalence); sensitivity >= 0.86"
      monitoring_plan: "Quarterly assessment; note potential VT underrepresentation; alert if AUROC drops below 0.89"

    - name: "White/Caucasian"
      description: "Majority demographic in baseline training (60%, n=900 validation); reference baseline for demographic parity"
      performance_expectations: "AUROC 0.94 (highest performance); sensitivity >= 0.90"
      monitoring_plan: "Quarterly assessment; reference group for demographic parity comparisons"

    - name: "Black/African American"
      description: "Baseline underrepresented (20% training, n=300 validation); target for HBCU data expansion (v1.1 goal: 40%)"
      performance_expectations: "Baseline v1.0: AUROC 0.91 (0.03 gap vs. White); v1.1 target: AUROC >= 0.92 (gap <= 0.02); sensitivity >= 0.88"
      monitoring_plan: "Quarterly high-priority assessment; explicit gap analysis vs. White cohort; trigger for v1.1 retraining if gap widens; FDA reporting of demographic parity progress"

    - name: "Hispanic/Latino"
      description: "Moderately represented in training (12%, n=180 validation); focus for future expansion"
      performance_expectations: "AUROC 0.92 (similar to overall); sensitivity >= 0.87"
      monitoring_plan: "Quarterly assessment; track representation in new data collections; if drops below 8%, flag for targeted recruitment"

    - name: "Asian American"
      description: "Moderately represented (8% of training, n=120 validation); maintain in future collections"
      performance_expectations: "AUROC 0.93 (similar to overall); sensitivity >= 0.88"
      monitoring_plan: "Quarterly assessment; maintain representation >= 8% in future data collections"

  monitoring_and_reporting: >
    Post-market surveillance framework: Quarterly performance audits on newly
    collected data from all 5 health systems (plus any new sites). Reports
    generated 30 days after quarter end, comparing recent performance to baseline.
    Reports include: AUROC/sensitivity/specificity overall and by demographic
    subgroup, confidence intervals, statistical significance of changes, root
    cause analysis if thresholds exceeded, adverse event summaries, mitigation
    plans. Annual comprehensive reports submitted to FDA per Medical Device Report
    (MDR) timeline. Any action-level alerts reported to FDA within 10 business
    days. Findings used to inform quarterly retraining decisions and v1.1
    development roadmap.

regulatory_compliance: "FDA 510(k) submission; Predetermined Change Control Plan per FDA December 2024 guidance; Medical Device Reporting (MDR) post-market surveillance; MedWatch adverse event reporting for serious events"

version: "1.0"

effective_date: "2026-10-15"
