# CardioGuard ECG-AI: FDA-Extended Model Card
# Based on Mitchell et al. 2019 "Model Cards for Model Reporting"
# with FDA-specific extensions for medical device context

model_details:
  model_name: "CardioGuard ECG-AI"
  model_version: "1.0"
  model_date: "2026-10-15"
  version_type: "Baseline - FDA cleared"
  architecture: "Transformer-based Deep Learning"
  framework: "PyTorch 2.0"
  inputs: "12-lead ECG signal (10 seconds, 500 Hz)"
  outputs: "Probability scores for 4 cardiac rhythm classes"

intended_use:
  primary_use_case: >
    Assist primary care and urgent care clinicians in detecting atrial fibrillation,
    ventricular tachycardia, and 1st degree atrioventricular block from 12-lead ECG
    recordings in ambulatory adult patients (age >= 18).

  intended_users: "Primary care physicians, nurse practitioners, urgent care clinicians"
  use_location: "Primary care clinics, urgent care centers, telehealth platforms"

factors:
  relevant_factors:
    - name: "Patient Age"
      description: "Model performance varies slightly by age; lower in 18-40 age group"
    - name: "Patient Sex"
      description: "No significant performance differences between male and female patients"
    - name: "Race/Ethnicity"
      description: "0.03 AUROC gap identified between White and Black populations; mitigation in progress"
    - name: "Comorbidities"
      description: "Model trained on diverse comorbidity profiles; no stratified analysis performed"
    - name: "ECG Equipment Type"
      description: "Trained on GE, Philips, Mortara, and Schiller ECG machines; may not generalize to untested manufacturers"
    - name: "Signal Quality"
      description: "Excluded ECGs with signal quality < 95% during training; real-world performance on marginal-quality signals unknown"
    - name: "Medication Effects"
      description: "No explicit control for QT-prolonging medications or electrolyte imbalances in training data"

  evaluation_factors:
    - "Patient population: ambulatory adults (18-85 years)"
    - "Geography: 5 US health systems across 4 regions (Northeast, West Coast, Midwest, Southeast, Southwest)"
    - "Clinical setting: primary care and urgent care (not ICU or inpatient)"
    - "Rhythm types: normal sinus, atrial fibrillation, ventricular tachycardia, 1st degree AV block"

metrics:
  overall_metrics:
    - name: "AUROC (Area Under Receiver Operating Characteristic)"
      value: 0.92
      ci_lower: 0.89
      ci_upper: 0.94
      description: "Overall discrimination ability across all 4 classes"
    - name: "Sensitivity (True Positive Rate)"
      value: 0.88
      description: "Proportion of all arrhythmias correctly detected"
    - name: "Specificity (True Negative Rate)"
      value: 0.92
      description: "Proportion of normal rhythms correctly identified"
    - name: "Positive Predictive Value (Precision)"
      value: 0.90
      description: "Of flagged cases, proportion that are true positives"
    - name: "Negative Predictive Value"
      value: 0.91
      description: "Of non-flagged cases, proportion that are true negatives"
    - name: "F1 Score"
      value: 0.89
      description: "Harmonic mean of sensitivity and PPV"

  per_class_metrics:
    atrial_fibrillation:
      auroc: 0.95
      sensitivity: 0.92
      specificity: 0.96
      ppv: 0.94
      npv: 0.95
    ventricular_tachycardia:
      auroc: 0.93
      sensitivity: 0.88
      specificity: 0.94
      ppv: 0.90
      npv: 0.93
    first_degree_av_block:
      auroc: 0.90
      sensitivity: 0.85
      specificity: 0.92
      ppv: 0.86
      npv: 0.91

  subpopulation_metrics:
    by_age:
      - age_group: "18-40 years"
        n: 300
        auroc: 0.91
        auroc_ci: [0.88, 0.92]
        sensitivity: 0.85
        specificity: 0.91
        clinical_note: "Lowest performance in younger cohort; recommend closer clinical review for equivocal scores"
      - age_group: "41-65 years"
        n: 750
        auroc: 0.95
        auroc_ci: [0.93, 0.96]
        sensitivity: 0.90
        specificity: 0.94
        clinical_note: "Highest performance; most common age group for target arrhythmias"
      - age_group: "66+ years"
        n: 450
        auroc: 0.94
        auroc_ci: [0.92, 0.95]
        sensitivity: 0.89
        specificity: 0.92
        clinical_note: "Strong performance; prevalent patient population"

    by_sex:
      - sex: "Male"
        n: 780
        auroc: 0.93
        auroc_ci: [0.91, 0.94]
        sensitivity: 0.88
        specificity: 0.93
      - sex: "Female"
        n: 720
        auroc: 0.91
        auroc_ci: [0.89, 0.92]
        sensitivity: 0.88
        specificity: 0.90
        clinical_note: "Slightly lower AUROC in females; may reflect lower training data prevalence of VT in female cohort"

    by_race_ethnicity:
      - group: "White"
        n: 900
        auroc: 0.94
        auroc_ci: [0.93, 0.96]
        sensitivity: 0.90
        specificity: 0.93
      - group: "Black/African American"
        n: 300
        auroc: 0.91
        auroc_ci: [0.89, 0.93]
        sensitivity: 0.86
        specificity: 0.91
        gap_vs_white: -0.03
        clinical_note: "0.03 AUROC gap identified; likely due to training data imbalance (60% White vs. 20% Black representation)"
      - group: "Hispanic/Latino"
        n: 180
        auroc: 0.92
        auroc_ci: [0.90, 0.94]
        sensitivity: 0.87
        specificity: 0.92
        gap_vs_white: -0.02
      - group: "Asian American"
        n: 120
        auroc: 0.93
        auroc_ci: [0.90, 0.95]
        sensitivity: 0.89
        specificity: 0.93
        gap_vs_white: -0.01

  equity_analysis: >
    Demographic parity: AUROC ranges from 0.91 (Black) to 0.94 (White), maximum gap 0.03.
    Equity concern: Performance gap between White and Black populations likely driven by
    (1) Training data imbalance (60% White, 20% Black), (2) potential ECG signal characteristic
    differences across equipment manufacturers and health system infrastructure, (3) higher
    prevalence of atrial fibrillation in White vs. Black populations in baseline training cohort.

    Mitigation status: ACTIVE - Additional 50,000 ECGs from 2 HBCU health systems in retraining
    pipeline for v1.1, with target to reduce gap to <= 0.02 AUROC. Timeline: Q4 2026.

training_data:
  training_dataset_name: "CardioGuard Training Cohort 2019-2023"
  training_data_n: 250000
  training_data_type: "12-lead ECG signals"
  training_data_sources:
    - health_system: "Health System A"
      location: "Northeast US"
      ecgs: 60000
      date_range: "2019-2023"
      equipment: "GE MUSE, Philips PageWriter"
    - health_system: "Health System B"
      location: "West Coast US"
      ecgs: 65000
      date_range: "2019-2023"
      equipment: "GE MUSE, Mortara ELI"
    - health_system: "Health System C"
      location: "Midwest US"
      ecgs: 55000
      date_range: "2020-2023"
      equipment: "Philips PageWriter, Schiller"
    - health_system: "Health System D"
      location: "Southeast US"
      ecgs: 40000
      date_range: "2021-2023"
      equipment: "GE MUSE"
    - health_system: "Health System E"
      location: "Southwest US"
      ecgs: 30000
      date_range: "2022-2023"
      equipment: "Mortara ELI, Philips PageWriter"

  data_preprocessing: >
    Zero-mean normalization per lead. High-pass filter (0.5 Hz) to remove baseline wander.
    50/60 Hz notch filter for powerline noise. Automated artifact detection and exclusion.
    No data augmentation applied (synthetic ECG generation).

  data_quality_standards: >
    All training ECGs verified for:
    (1) Signal integrity: 12 contiguous leads, sampling rate >= 500 Hz, duration 10 seconds
    (2) Artifact: baseline wander < 5 mV, electrode noise RMS < 2 mV, no powerline contamination
    (3) Labels: rhythm annotation by board-certified cardiologist, inter-rater reliability Fleiss kappa >= 0.80
    (4) Completeness: no missing or corrupted samples (data completeness >= 99%)

  training_data_demographics:
    age:
      - "18-40 years: 14% (35,000)"
      - "41-65 years: 52% (130,000)"
      - "66+ years: 34% (85,000)"
    sex:
      - "Male: 52% (130,000)"
      - "Female: 48% (120,000)"
    race_ethnicity:
      - "White: 60% (150,000)"
      - "Black/African American: 20% (50,000)"
      - "Hispanic/Latino: 12% (30,000)"
      - "Asian American: 8% (20,000)"
    comorbidities:
      - "Hypertension: 50% (125,000)"
      - "Diabetes: 25% (62,500)"
      - "Structural heart disease: 15% (37,500)"
    class_distribution:
      - "Normal sinus rhythm: 62% (155,000)"
      - "Atrial fibrillation: 21% (52,500)"
      - "1st degree AV block: 7% (17,500)"
      - "Ventricular tachycardia: 6% (15,000)"
      - "Other (excluded): 4% (10,000)"

  data_splits:
    training: "70% (175,000 ECGs)"
    validation: "15% (37,500 ECGs)"
    test: "15% (37,500 ECGs)"
    note: "Stratified split to maintain class balance and demographic representation across splits"

  missing_data_and_gaps: >
    (1) Pediatric population (< 18 years): No pediatric ECG data in training set; model not indicated or validated for children.
    (2) ICU/intubated patients: Excluded from training; generalization to ICU settings unknown.
    (3) Paced rhythms: Explicitly excluded; model not designed to detect or classify pacemaker-generated rhythms.
    (4) Non-US populations: All data from US health systems; generalization to international settings unknown.
    (5) ECG manufacturers not represented: Some manufacturers (e.g., Mindray, Schiller Cardiovit) underrepresented; model performance on their equipment untested.
    (6) Medication effects: No stratified analysis of QT-prolonging drugs, electrolyte imbalances, or drug-induced arrhythmias.

model_card_contact:
  team: "CardioGuard Medical Clinical Affairs and Regulatory Team"
  contact_email: "fda-submissions@cardiogaurd-medical.com"
  date_contact_updated: "2026-10-15"

model_parameters:
  total_parameters: 2300000
  trainable_parameters: 2300000
  backbone_architecture: "Transformer Encoder (4 layers, 8 attention heads, 256 hidden dim)"
  input_layer: "Preprocessing (normalization + filtering)"
  output_layer: "Softmax classification head (4 outputs)"
  activation_functions: "ReLU (hidden layers), Softmax (output)"

training_process:
  optimizer: "Adam"
  learning_rate: 0.0001
  weight_decay: 1e-5
  batch_size: 128
  loss_function: "Weighted cross-entropy"
  loss_weights: "Normal=1.0, AFib=2.5, VT=2.2, AV block=1.8"
  epochs: 150
  early_stopping: "Patience 10 epochs on validation AUROC"
  hardware: "GPU cluster (8x NVIDIA A100, 40 GB memory)"
  training_time: "112 total GPU-days"
  framework_versions:
    pytorch: "2.0.0"
    numpy: "1.24.0"
    pandas: "2.0.0"
    scikit_learn: "1.3.0"

evaluation_results:
  evaluation_date: "2026-06-30"
  evaluation_data_source: "Clinical validation study (Johns Hopkins, Stanford Health, Mayo Clinic)"
  evaluation_sample_size: 1500
  evaluation_methodology: "Retrospective, double-blinded, board-certified cardiologist adjudication"

limitations:
  model_limitations: >
    (1) Performance varies by patient age; lower in younger adults (18-40 years, AUROC 0.91 vs. 0.95 in 41-65)
    (2) Identified 0.03 AUROC gap between White and Black populations in validation cohort
    (3) Model trained on North American data; generalization to non-US health systems unknown
    (4) ECG signal quality threshold (>95%) used in training; real-world performance on lower-quality signals unknown
    (5) No validation in pediatric populations (explicitly excluded from intended use)
    (6) No validation in ICU or critically ill patients
    (7) Does not detect or classify paced rhythms
    (8) No explicit analysis of medication effects or electrolyte-induced arrhythmias
    (9) Model focused on 3 specific arrhythmia types; performance on other arrhythmias (e.g., atrial flutter, SVT) not evaluated

  use_limitations: >
    (1) Device is intended as clinical decision support; does not replace clinical judgment or cardiology consultation
    (2) Integration with primary care workflow assumes access to 12-lead ECG machine (not all urgent cares have this)
    (3) Requires trained healthcare provider to obtain ECG and interpret model output; not designed for patient self-use
    (4) Real-time arrhythmia detection (continuous monitoring) is not supported; designed for single recordings

ethical_considerations:
  fairness: >
    Model demonstrates lower performance in Black/African American populations (0.03 AUROC gap).
    This difference is not due to model bias per se, but reflects training data imbalance and potential
    signal characteristic variations. Mitigation underway: additional diverse data collection and retraining
    with stratified loss weighting. Equity will be re-evaluated in v1.1 (Q4 2026).

  transparency: >
    Probability scores and confidence intervals provided to clinicians to support explainability.
    Training data sources, class balance, and demographic composition disclosed in this model card.
    Known limitations and performance gaps clearly documented.

  accessibility: >
    CloudAPI deployment accessible to primary care settings of varying IT sophistication.
    Future: on-premise Docker container option for hospital IT integration.
    Clinical labeling designed for clinicians of varying ECG expertise.

bias_mitigation: >
    (1) Training data collected from 5 diverse US health systems and geographic regions
    (2) Demographic balancing targets specified for retraining (age, sex, race/ethnicity)
    (3) Subpopulation performance monitoring and gap analysis conducted routinely
    (4) Identified gaps (Black population) addressed with targeted data collection
    (5) Class imbalance addressed with weighted sampling and weighted loss function
    (6) Prospective clinical validation study used to detect equity issues early

recommendations_for_use:
  recommended_use_cases:
    - "Primary care clinic: ECG screening for AFib in patients with palpitations"
    - "Urgent care: rapid arrhythmia assessment for patient with syncope"
    - "Telehealth: remote ECG review to triage referral to cardiologist"

  not_recommended_use_cases:
    - "Pediatric patients (< 18 years)"
    - "ICU or inpatient critical care"
    - "Pacemaker or ICD patients"
    - "Real-time continuous monitoring"

  usage_recommendations: >
    (1) Clinicians should review model output in context of patient presentation and clinical exam
    (2) When model score is equivocal (probability 0.50-0.70), additional clinical judgment or cardiology consultation recommended
    (3) In younger patients (18-40 years), consider lower sensitivity (0.85 vs. 0.90) in clinical decision-making
    (4) If patient presentation conflicts with model output, prioritize patient presentation and consider cardiology referral

further_research_directions:
  - "Prospective study in real-world primary care deployment to validate real-world performance"
  - "Sub-group analysis of medication effects (beta-blockers, QT-prolonging drugs) on model performance"
  - "Validation in non-US healthcare systems and different ECG equipment manufacturers"
  - "Pediatric validation study (separate from adult model, v2.0)"
  - "Integration with wearable ECG devices (Apple Watch, Kardia) for single-lead signal performance"

references:
  - "Mitchell et al. (2019) Model Cards for Model Reporting. https://arxiv.org/abs/1810.03993"
  - "FDA PCCP Guidance (Dec 2024). https://www.fda.gov/regulatory-information/search-fda-guidance-documents/predetermined-change-control-plans-machine-learning-enabled-medical-devices"
  - "Anumana ECG-AI (K232488) 510(k) Submission. FDA CDRH Database."
  - "IEC 62304:2015 Medical device software - Software lifecycle processes"
  - "ISO 13485:2016 Medical devices - Quality management systems"
