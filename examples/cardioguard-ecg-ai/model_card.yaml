# CardioGuard ECG-AI: FDA-Extended Model Card
# Based on Mitchell et al. 2019 "Model Cards for Model Reporting"
# with FDA-specific extensions for medical device context

model_details:
  name: "CardioGuard ECG-AI"
  version: "1.0.0"
  owner: "CardioGuard Medical, Inc."
  license: "Proprietary - Licensed for medical device use"
  contact: "fda-submissions@cardiogaurd-medical.com"
  release_date: "2026-10-15"

intended_use:
  primary_use: >
    Assist primary care and urgent care clinicians in detecting atrial fibrillation,
    ventricular tachycardia, and 1st degree atrioventricular block from 12-lead ECG
    recordings in ambulatory adult patients (age >= 18).
  intended_users:
    - "Primary care physicians"
    - "Nurse practitioners"
    - "Urgent care clinicians"
  clinical_setting:
    - "Primary care clinics"
    - "Urgent care centers"
    - "Telehealth platforms"
  contraindications:
    - "Pediatric patients (< 18 years)"
    - "ICU or critically ill inpatients"
    - "Patients with pacemakers or implantable cardioverter-defibrillators (ICDs)"
  out_of_scope_uses:
    - "Real-time continuous cardiac monitoring"
    - "Standalone diagnostic tool (clinical decision support only)"
    - "Assessment of arrhythmias not in intended rhythm classes (e.g., atrial flutter)"

factors:
  instrumentation:
    - "GE MUSE ECG machine"
    - "Philips PageWriter ECG machine"
    - "Mortara ELI ECG system"
    - "Schiller ECG equipment"
  environment:
    clinical_workflow: "Single-recording, non-emergency assessment"
    signal_requirements: "12-lead contiguous ECG, 10 seconds duration, 500 Hz sampling minimum"
  demographic_groups_evaluated:
    - "Age (18-40, 41-65, 66+ years)"
    - "Sex (Male, Female)"
    - "Race/Ethnicity (White, Black/African American, Hispanic/Latino, Asian American)"
  datasets_used:
    - "CardioGuard Training Cohort 2019-2023 (5 health systems, 250,000 ECGs)"
    - "Johns Hopkins validation cohort (internal)"
    - "Stanford Health validation cohort (internal)"
    - "Mayo Clinic validation cohort (internal)"

metrics:
  overall:
    AUROC: 0.92
    Sensitivity: 0.88
    Specificity: 0.92
    PPV: 0.90
    NPV: 0.91
    F1_Score: 0.89
  overall_confidence_intervals:
    AUROC: [0.89, 0.94]
    Sensitivity: [0.85, 0.90]
    Specificity: [0.90, 0.93]
  threshold_used: 0.5
  notes: "Binary classification thresholds optimized on validation set; per-class confidence scores provided to clinicians."
  subgroups:
    - subgroup_name: "Age 18-40 years"
      subgroup_definition: "Ambulatory adults ages 18-40 at time of ECG recording"
      n_cases: 300
      metrics:
        AUROC: 0.91
        Sensitivity: 0.85
        Specificity: 0.91
      confidence_intervals:
        AUROC: [0.88, 0.92]
    - subgroup_name: "Age 41-65 years"
      subgroup_definition: "Ambulatory adults ages 41-65 at time of ECG recording"
      n_cases: 750
      metrics:
        AUROC: 0.95
        Sensitivity: 0.90
        Specificity: 0.94
      confidence_intervals:
        AUROC: [0.93, 0.96]
    - subgroup_name: "Age 66+ years"
      subgroup_definition: "Ambulatory adults age 66 and older at time of ECG recording"
      n_cases: 450
      metrics:
        AUROC: 0.94
        Sensitivity: 0.89
        Specificity: 0.92
      confidence_intervals:
        AUROC: [0.92, 0.95]
    - subgroup_name: "Male"
      subgroup_definition: "Patients with sex assigned male at birth, documented in medical record"
      n_cases: 780
      metrics:
        AUROC: 0.93
        Sensitivity: 0.88
        Specificity: 0.93
      confidence_intervals:
        AUROC: [0.91, 0.94]
    - subgroup_name: "Female"
      subgroup_definition: "Patients with sex assigned female at birth, documented in medical record"
      n_cases: 720
      metrics:
        AUROC: 0.91
        Sensitivity: 0.88
        Specificity: 0.90
      confidence_intervals:
        AUROC: [0.89, 0.92]
    - subgroup_name: "White/Caucasian"
      subgroup_definition: "Patients self-identified as White or Caucasian race/ethnicity"
      n_cases: 900
      metrics:
        AUROC: 0.94
        Sensitivity: 0.90
        Specificity: 0.93
      confidence_intervals:
        AUROC: [0.93, 0.96]
    - subgroup_name: "Black/African American"
      subgroup_definition: "Patients self-identified as Black or African American race/ethnicity"
      n_cases: 300
      metrics:
        AUROC: 0.91
        Sensitivity: 0.86
        Specificity: 0.91
      confidence_intervals:
        AUROC: [0.89, 0.93]
    - subgroup_name: "Hispanic/Latino"
      subgroup_definition: "Patients self-identified as Hispanic or Latino race/ethnicity"
      n_cases: 180
      metrics:
        AUROC: 0.92
        Sensitivity: 0.87
        Specificity: 0.92
      confidence_intervals:
        AUROC: [0.90, 0.94]
    - subgroup_name: "Asian American"
      subgroup_definition: "Patients self-identified as Asian American or Asian race/ethnicity"
      n_cases: 120
      metrics:
        AUROC: 0.93
        Sensitivity: 0.89
        Specificity: 0.93
      confidence_intervals:
        AUROC: [0.90, 0.95]

evaluation_data:
  datasets:
    - "Johns Hopkins validation cohort: 500 ECGs (2023)"
    - "Stanford Health validation cohort: 500 ECGs (2023)"
    - "Mayo Clinic validation cohort: 500 ECGs (2023)"
  motivation: "External validation across 3 independent health systems and geographies to assess generalization beyond training data sources"
  preprocessing:
    - "Zero-mean normalization per lead"
    - "High-pass Butterworth filter (0.5 Hz cutoff) for baseline wander removal"
    - "50/60 Hz notch filter for powerline noise rejection"
    - "Artifact detection and signal quality assessment (excluded <95% quality)"
  test_train_split:
    train: 0.70
    validation: 0.15
    test: 0.15
  stratification:
    - "Stratified by cardiac rhythm class (normal, AFib, VT, AV block)"
    - "Stratified by demographic subgroups (age, sex, race/ethnicity)"
    - "Stratified by ECG equipment type to ensure diversity"

training_data:
  datasets:
    - "Health System A (Northeast): 60,000 ECGs (2019-2023), GE MUSE + Philips PageWriter"
    - "Health System B (West Coast): 65,000 ECGs (2019-2023), GE MUSE + Mortara ELI"
    - "Health System C (Midwest): 55,000 ECGs (2020-2023), Philips PageWriter + Schiller"
    - "Health System D (Southeast): 40,000 ECGs (2021-2023), GE MUSE"
    - "Health System E (Southwest): 30,000 ECGs (2022-2023), Mortara ELI + Philips PageWriter"
  sample_size: 250000
  demographics:
    age_mean: 56.3
    age_18_40_pct: 14
    age_41_65_pct: 52
    age_66_plus_pct: 34
    male_pct: 52
    female_pct: 48
    white_pct: 60
    black_pct: 20
    hispanic_pct: 12
    asian_pct: 8
  data_sources:
    - "Health system EHR/PACS systems via HL7 FHIR APIs"
    - "Direct database connections (de-identified)"
  inclusion_criteria:
    - "Ambulatory adult patients age >= 18 years"
    - "12-lead ECG recordings with complete signal integrity"
    - "ECG duration >= 10 seconds at >= 500 Hz sampling"
    - "Validated rhythm annotations by board-certified cardiologist (kappa >= 0.80)"
  exclusion_criteria:
    - "Pediatric patients (< 18 years)"
    - "ICU or inpatient critical care recordings"
    - "Pacemaker or ICD-generated rhythms"
    - "Signal quality < 95% (artifact, noise, missing leads)"
    - "Non-US health system data"
  quality_control:
    - "Inter-rater agreement verification (Fleiss kappa >= 0.80)"
    - "Automated artifact detection (baseline wander < 5 mV, electrode noise RMS < 2 mV)"
    - "Signal completeness verification (12 leads, no corruption)"
    - "Data completeness >= 99%"
  data_shifts_addressed:
    - "Class imbalance addressed via stratified sampling and weighted loss function (Normal=1.0, AFib=2.5, VT=2.2, AV block=1.8)"
    - "Geographic diversity across 5 health systems in 4 US regions"
    - "Temporal coverage spanning 2019-2023 to capture natural variation"

ethical_considerations:
  impact_summary: >
    CardioGuard ECG-AI has the potential to improve arrhythmia detection in primary care settings,
    reducing diagnostic delays and enabling timely treatment. Potential harms include false positives
    (unnecessary cardiology referrals, anxiety) and false negatives (missed diagnoses). A 0.03 AUROC
    gap between White and Black populations has been identified and is being actively addressed through
    targeted data collection and retraining.
  potential_harms:
    - "False positives: unnecessary cardiology referrals, increased healthcare costs, patient anxiety"
    - "False negatives: missed arrhythmia diagnoses, delayed treatment, increased risk of stroke (AFib) or sudden cardiac death (VT)"
    - "Over-reliance: clinicians may defer to model output without clinical judgment"
    - "Performance disparities: lower sensitivity in underrepresented demographic groups may exacerbate health inequities"
  demographic_disparities: >
    A 0.03 AUROC gap has been identified between White (0.94) and Black/African American (0.91) populations
    in the baseline v1.0 validation cohort. This gap is primarily driven by training data imbalance (60% White vs. 20% Black)
    and reflects a persistent healthcare equity concern. Targeted mitigation is underway: (1) recruitment of 50,000 additional
    ECGs from HBCU-affiliated health systems to increase Black/African American representation to 40%, (2) stratified loss weighting
    to improve minority group performance, and (3) explicit monitoring of subgroup AUROC gaps with FDA reporting. Target for v1.1
    (Q4 2026): AUROC gap <= 0.02 across all demographic groups.
  bias_mitigation_strategies:
    - "Training data collected from 5 geographically diverse health systems and 4 US regions"
    - "Demographic stratification in train/validation/test splits to ensure representation"
    - "Subpopulation performance analysis and explicit AUROC gap monitoring"
    - "Class-weighted loss function to balance arrhythmia detection (high sensitivity) with specificity"
    - "Planned HBCU data expansion (v1.1) targeting underrepresented Black/African American populations"
    - "Prospective clinical validation study with double-blind adjudication to detect equity issues early"
  fairness_considerations: >
    While the model demonstrates strong overall performance, the identified 0.03 AUROC gap in Black/African American
    populations reflects data imbalance rather than model bias per se. This gap is clinically significant and incompatible
    with equitable care. CardioGuard Medical is committed to health equity through aggressive demographic rebalancing,
    continuous subgroup monitoring, and transparent FDA reporting. Equity will be re-evaluated in v1.1 with a target for
    achieving <= 0.02 AUROC gap and demonstrating demographic parity in sensitivity/specificity across all groups.

caveats_recommendations:
  caveats:
    - "Performance varies by patient age; lower in younger adults (18-40 years, AUROC 0.91 vs. 0.95 in 41-65)"
    - "Baseline 0.03 AUROC gap between White and Black populations; mitigation in progress"
    - "Model trained on North American data; generalization to non-US health systems unknown"
    - "ECG signal quality threshold (>95%) used in training; real-world performance on lower-quality signals unknown"
    - "Not validated in pediatric populations; explicitly excluded from intended use"
    - "Not validated in ICU or critically ill patients"
    - "Does not detect or classify paced rhythms"
    - "No explicit analysis of medication effects (QT-prolonging drugs, electrolyte imbalances)"
    - "Focused on 3 specific arrhythmia types; performance on other arrhythmias (atrial flutter, SVT) not evaluated"
  recommendations:
    - "Clinicians should review model output in context of patient presentation and clinical examination"
    - "When model confidence is equivocal (0.50-0.70 probability), additional clinical judgment or cardiology consultation recommended"
    - "In younger patients (18-40 years), consider slightly lower sensitivity (0.85 vs. 0.90) in clinical decision-making"
    - "If patient presentation conflicts with model output, prioritize patient presentation and consider cardiology referral"
    - "Manual review recommended for any equivocal scores; do not rely solely on model output for treatment decisions"
  known_limitations:
    - "Sensitivity drops to 85% in 18-40 age group vs. 90% in 41-65 age group"
    - "0.03 AUROC gap in Black/African American population (AUROC 0.91 vs. 0.94 in White population)"
    - "Model designed for single ECG recordings; not intended for continuous real-time monitoring"
    - "Performance on non-standard ECG equipment (manufacturers not represented in training) is unknown"
    - "No evaluation in concurrent medications or electrolyte disturbances"
  future_improvements: >
    Planned improvements include: (1) v1.1 retraining with HBCU data targeting demographic parity by Q4 2026,
    (2) prospective real-world deployment study in primary care clinics to validate real-world performance,
    (3) sub-group analysis of medication effects (beta-blockers, QT-prolonging drugs, electrolyte imbalances),
    (4) validation in non-US healthcare systems and ECG equipment manufacturers, (5) pediatric validation study
    as a separate model (v2.0) for children ages 5-17, (6) integration with wearable ECG devices (Apple Watch,
    Kardia) for single-lead signal performance assessment.

fda_specific:
  intended_use_statement: >
    CardioGuard ECG-AI is indicated for use in ambulatory primary care and urgent care settings to assist
    clinicians in the detection of atrial fibrillation, ventricular tachycardia, and 1st degree AV block from
    12-lead ECG recordings in adult patients (age 18 and older) presenting with signs or symptoms of arrhythmia.
    The device provides clinical decision support and is not intended as a standalone diagnostic tool. Clinician
    review and clinical judgment are required for patient management decisions.
  classification: "Class II - Software as a Medical Device (SaMD)"
  predicate_devices:
    - "Anumana ECG-AI (K232488)"
  substantial_equivalence_summary: >
    CardioGuard ECG-AI is substantially equivalent to Anumana ECG-AI in intended use, technological characteristics,
    and performance. Both devices are transformer-based deep learning models for ECG-based arrhythmia detection in
    primary care settings. Differences: CardioGuard targets 3 arrhythmia types (AFib, VT, 1st degree AV block) with
    12-lead ECG input. Performance is comparable (AUROC 0.92 vs. predicate 0.91). Clinical validation demonstrates
    non-inferiority. Safety and effectiveness data support 510(k) approval pathway.
  drift_monitoring_plan: >
    Quarterly post-market performance monitoring on newly collected ECGs from all deployed health systems.
    Performance metrics (AUROC, sensitivity, specificity) compared to baseline using statistical tests (DeLong, McNemar).
    Warning thresholds: AUROC drops > 0.02 below baseline (0.92 → 0.90), sensitivity drops > 3%.
    Action thresholds: AUROC drops > 0.05 below baseline (0.92 → 0.87), sensitivity drops > 7%, any demographic subgroup
    AUROC gap > 0.03. Warning-level alerts trigger root cause investigation within 2 weeks. Action-level alerts trigger
    immediate clinical review and potential deployment halt. All action-level alerts reported to FDA within 10 business days.
  failure_modes:
    - "Paroxysmal AFib may not be electrically evident during ECG recording; mitigated by clinical workflow and patient presentation context"
    - "Extreme heart rates (>120 BPM) may reduce sensitivity; mitigated by clinical judgment and cardiology referral for equivocal cases"
    - "Poor signal quality (noise, artifact) reduces model confidence; mitigated by automated quality checks and manual review"
    - "Medication effects (QT-prolongation) may alter ECG morphology; mitigated by clinician awareness and manual review"
  update_cadence: >
    Quarterly retraining with new health system data to maintain performance and improve demographic equity.
    Retraining triggered automatically when drift monitoring detects warning thresholds, or quarterly on schedule.
    Major versions (v1.1, v1.2) planned annually with comprehensive revalidation. All retraining follows FDA-approved
    Predetermined Change Control Plan (PCCP) protocol. Performance degradation > action thresholds triggers immediate
    retraining cycle and potential deployment halt.
  post_market_surveillance: >
    Comprehensive post-market surveillance includes: (1) quarterly drift monitoring and FDA performance reporting,
    (2) MedWatch reporting for serious adverse events within 30 days, (3) adverse event email feedback mechanism for clinicians,
    (4) annual Medical Device Reporting (MDR) summary, (5) prospective real-world effectiveness study in deployed health systems,
    (6) subgroup performance monitoring with explicit gap analysis for demographic equity. All findings inform quarterly retraining
    decisions and regulatory submissions to FDA.
  human_factors_summary: >
    Clinical workflow integration: model operates as decision support within EHR; clinicians view probability scores for each rhythm class
    and clinical context. Usability testing conducted with 16 primary care and urgent care clinicians across 3 health systems. Training
    required: 15-minute walkthrough of model output format, confidence intervals, and decision tree (when to refer to cardiology).
    99% of tested clinicians correctly interpreted model output and made appropriate clinical decisions. No safety-related usability issues identified.
