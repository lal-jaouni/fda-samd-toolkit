# CardioGuard ECG-AI: Clinical Validation Plan Configuration
# Retrospective, double-blinded, multi-site validation study
# FDA-aligned clinical validation schema for 510(k) submission

device_name: "CardioGuard ECG-AI"

intended_use: >
  CardioGuard ECG-AI is intended to assist primary care and urgent care clinicians
  in detecting atrial fibrillation, ventricular tachycardia, and 1st degree
  atrioventricular block from 12-lead electrocardiogram (ECG) recordings in
  ambulatory adult patients (age >= 18 years) presenting with signs or symptoms
  of cardiac arrhythmia.

modality: "signals"

document_version: "1.0"

document_date: "2026-04-10"

study_design:
  type: "retrospective"
  blinding: "double-blinded"
  multi_site: true
  sites_count: 3
  site_locations:
    - "Johns Hopkins Medical Center, Baltimore, MD"
    - "Stanford Health, Palo Alto, CA"
    - "Mayo Clinic, Rochester, MN"
  study_duration_months: 18

data_source:
  sites:
    - "Johns Hopkins Hospital ECG Repository (MUSE ECG Management System)"
    - "Stanford Health ECG Database (Philips PageWriter and Mortara ELI)"
    - "Mayo Clinic Cardiovascular Biobank (Multi-platform ECG collection)"
  time_period_start: "2020-01-01"
  time_period_end: "2023-12-31"
  inclusion_criteria:
    - "Age 18 years or older at time of ECG"
    - "Complete 12-lead ECG recording with sampling rate >= 250 Hz"
    - "Confirmed cardiac diagnosis or clinical follow-up within 6 months of index ECG"
    - "Available cardiology assessment, device interrogation, or clinical documentation for reference standard"
    - "Adequate ECG signal quality (baseline wander < 5 mV, noise < 2 mV)"
  exclusion_criteria:
    - "Pediatric patients (age < 18 years)"
    - "Incomplete or corrupted ECG signal (missing leads, excessive noise or artifact)"
    - "ECG signal quality score < 80% as determined by automated artifact detection"
    - "Paced rhythms (pacemaker or ICD patients)"
    - "Insufficient clinical follow-up data for reference standard determination (< 6 months)"
    - "Inadequate documentation for adjudicator review and reference standard assignment"
  sample_size: 1500
  sample_size_justification: >
    Sample size of 1500 subjects provides adequate statistical power for primary endpoint
    (AUROC >= 0.90 with 95% CI lower bound >= 0.87). Based on assumption of true AUROC
    = 0.92 (from internal validation), alpha = 0.05 (two-tailed), beta = 0.10 (80% power),
    required sample size is approximately 1200 patients. Oversampled to 1500 to enable
    stratified subgroup analysis by age, sex, and race/ethnicity. Enrollment targets:
    Johns Hopkins 600, Stanford 450, Mayo Clinic 450.
  population_diversity: >
    Target population diversity by age (18-40: 25%, 41-65: 35%, 66+: 40%),
    sex (Male: 52%, Female: 48%), and race/ethnicity (White: 60%, Black/African American: 20%,
    Hispanic/Latino: 12%, Asian American: 8%). Additional focus on comorbidity representation:
    Hypertension (50%), Diabetes (25%), Structural heart disease (15%), Chronic kidney disease (10%).

reference_standard:
  gold_standard: >
    Clinical diagnosis of cardiac arrhythmia confirmed by board-certified cardiologists
    based on 12-lead ECG interpretation, correlation with clinical symptoms, medical history,
    device interrogation data (for pacemaker/ICD patients), or electrophysiology testing results.
  reference_source: >
    Board-certified cardiologist clinical assessment via consensus adjudication process with
    escalation to electrophysiology specialist for tie-breaking if needed.
  adjudication_process: >
    (1) Three independent board-certified cardiologists review each ECG independently,
    blinded to CardioGuard model output; (2) Each adjudicator assigns rhythm classification
    (normal sinus, atrial fibrillation, ventricular tachycardia, 1st degree AV block, other);
    (3) Consensus classification based on agreement of at least 2 of 3 adjudicators;
    (4) Disagreement among all 3 adjudicators escalated to fourth adjudicator
    (electrophysiology specialist) for tie-breaking.
  adjudicator_qualifications: >
    Board certification in Cardiology from American Board of Internal Medicine, minimum
    5 years post-board certification clinical experience, demonstrated expertise in
    arrhythmia interpretation (publication record, electrophysiology fellowship, or
    clinical role in arrhythmia center), and successful completion of study protocol training.
  number_of_adjudicators: 3
  inter_rater_reliability_target: 0.85
  inter_rater_reliability_method: "Fleiss kappa (target >= 0.80 for substantial agreement)"

endpoints:
  primary_endpoint: >
    CardioGuard ECG-AI demonstrates adequate discrimination ability between arrhythmia
    cases and non-cases with acceptable precision.
  primary_endpoint_target: "AUROC >= 0.90 (95% confidence interval lower bound >= 0.87)"
  secondary_endpoints:
    - "Sensitivity >= 0.85 (at least 85% of true arrhythmias correctly detected)"
    - "Specificity >= 0.90 (at least 90% of true negatives correctly identified)"
    - "Positive Predictive Value >= 0.88 (of flagged cases, at least 88% are true positives)"
    - "Negative Predictive Value >= 0.90 (of non-flagged cases, at least 90% are true negatives)"
    - "Sub-population AUROC Gap <= 0.03 (maximum AUROC difference between demographic groups)"
  sensitivity_target: 0.85
  specificity_target: 0.90
  sensitivity_lower_ci: 0.82
  specificity_lower_ci: 0.88
  positive_predictive_value_target: 0.88
  negative_predictive_value_target: 0.90

statistical_analysis_plan:
  primary_hypothesis: >
    CardioGuard ECG-AI achieves non-inferiority compared to predicate device (Anumana K232488)
    with AUROC >= 0.90 (95% CI lower bound >= 0.87), demonstrating adequate discrimination
    ability for clinical detection of atrial fibrillation, ventricular tachycardia, and
    1st degree atrioventricular block from 12-lead ECG.
  statistical_test: >
    Primary analysis uses ROC analysis with DeLong method for nonparametric comparison of
    ROC curves and 95% confidence intervals. Sensitivity and specificity calculated at
    pre-specified clinical decision threshold (probability >= 0.70). Subgroup analyses
    using stratified AUROC calculation for age, sex, and race/ethnicity groups.
  significance_level: 0.05
  power_target: 0.90
  power_calculation_description: >
    Assumed true AUROC = 0.92 based on internal validation data. Sample size of 1500
    provides 80% statistical power to detect non-inferiority margin of 0.03 AUROC below
    predicate device baseline (0.92). Two-tailed alpha = 0.05. Formula: sample sizes for
    ROC AUC comparison using published methods (DeLong, 1988; Obuchowski, 1997).
  multiplicity_correction: "None (all secondary endpoints are pre-specified)"
  missing_data_strategy: >
    Complete-case analysis with no imputation of missing data. Document any missing data
    patterns and conduct sensitivity analysis if more than 5% of values missing for any
    primary outcome variable.
  sensitivity_analyses:
    - "Exclude outlier sites or patient subgroups and re-analyze primary endpoint"
    - "Sensitivity at alternative decision thresholds (0.60, 0.65, 0.70, 0.75)"
    - "Performance in subgroups with different comorbidity profiles"
    - "Temporal trends if data collected across multiple years"

subgroup_analysis:
  subgroups:
    - "Age: 18-40 years, 41-65 years, 66+ years"
    - "Sex: Male, Female"
    - "Race/Ethnicity: White, Black/African American, Hispanic/Latino, Asian American"
  stratification_variables:
    - "Age group"
    - "Sex"
    - "Race/ethnicity"
  performance_target_by_subgroup:
    "Age 18-40": "AUROC 0.88-0.91 (lower prevalence; n=375)"
    "Age 41-65": "AUROC >= 0.92 (peak prevalence; n=525)"
    "Age 66+": "AUROC 0.91-0.94 (high prevalence; n=600)"
    "Male": "AUROC 0.93 (n=780)"
    "Female": "AUROC 0.91 (n=720)"
    "White": "AUROC 0.94 (baseline group; n=900)"
    "Black/African American": "AUROC 0.91 baseline, target 0.92 post-v1.1 retraining (n=300)"
    "Hispanic/Latino": "AUROC 0.92 (n=180)"
    "Asian American": "AUROC 0.93 (n=120)"
  minority_representation: >
    Enrollment targets oversampled Black/African American patients (20% vs US prevalence 13%)
    to ensure adequate sample size for equitable performance assessment. Planned data expansion
    via HBCU partnerships in v1.1 retraining to reduce documented 0.03 AUROC gap identified
    in internal validation. All demographic subgroups monitored quarterly post-market.
  differential_performance_analysis: >
    Stratified AUROC/sensitivity/specificity calculated for all subgroups. AUROC gap
    analysis comparing minority populations to majority (White) baseline. Flag for further
    investigation if any subgroup AUROC drops >0.03 from overall or previous measurement.
    Document and report demographic parity metrics to FDA quarterly.

generalization_testing:
  external_validation_sites:
    - "Three independent US health systems (Johns Hopkins, Stanford, Mayo Clinic)"
  external_validation_sample_size: 1500
  external_validation_timeline: >
    External validation conducted retrospectively on existing data from 2020-2023.
    Validation performance compared to internal development cohort to assess generalization
    across multiple healthcare systems, ECG equipment platforms (GE MUSE, Philips, Mortara),
    and diverse patient populations.
  temporal_validation_plan: >
    Data spans 2020-2023 (3-4 years). Temporal analysis stratified by year of ECG to
    assess for temporal drift in model performance. Any significant performance decline
    in recent years (2023) compared to baseline (2020) will be investigated for potential
    equipment changes or population shifts.
  data_drift_monitoring: >
    Post-deployment monitoring compares real-world ECG characteristics (age distribution,
    rhythm prevalence, equipment type) to validation cohort baseline. Quarterly assessment
    of model performance on newly captured ECGs. Alert thresholds: AUROC drops >0.02 below
    baseline (warning), >0.05 (action). Drift detected via statistical testing (DeLong test)
    and documented in FDA post-market surveillance reports.
  geographic_generalization_plan: >
    Three-site multi-region validation (East Coast: Johns Hopkins; West Coast: Stanford;
    Midwest: Mayo Clinic) provides assessment of geographic generalization. Sites represent
    different patient demographics, comorbidity profiles, and ECG equipment platforms.
    Performance analyzed separately by site to identify any region-specific performance gaps.

safety_monitoring:
  adverse_event_definition: >
    Adverse event: any clinical outcome (stroke, myocardial infarction, sudden cardiac death,
    hospitalization) occurring within 6 months after ECG study date, classified as potentially
    related to CardioGuard model performance (e.g., missed arrhythmia detection leading to
    delayed diagnosis).
  serious_adverse_event_definition: >
    Serious adverse event: death, myocardial infarction, stroke, or hospitalization for
    ventricular arrhythmia in patient with false negative CardioGuard output (model predicted
    low risk but patient had undetected arrhythmia).
  adverse_event_monitoring_plan: >
    (1) No prospective safety monitoring (retrospective study). (2) Post-hoc review of
    discordant cases where CardioGuard output conflicts significantly with adjudication.
    (3) Chart review for documented clinical outcomes (stroke, MI, SCD) within 6 months of
    index ECG. (4) Case report form completed for any serious adverse events potentially
    related to false negatives. (5) Patterns analyzed for specific rhythm types or patient
    subgroups.
  false_positive_impact_assessment: >
    False positive classifications (model predicts arrhythmia but adjudication is normal)
    may lead to unnecessary clinical follow-up (repeat ECG, cardiology referral, imaging,
    medication initiation). Estimated clinical impact: 5-10% of false positive cases result
    in unnecessary cardiology referral; cost approximately $500-1000 per referral. Mitigated
    by clinical workflow integration (model provides decision support, not standalone diagnosis)
    and user training to emphasize confirmation with expert review.
  false_negative_impact_assessment: >
    False negative classifications (model predicts normal but adjudication is arrhythmia)
    delay diagnosis and treatment initiation. Specific clinical impacts by rhythm:
    AFib missed diagnosis increases stroke risk (5-year cumulative incidence 30% vs <2% if diagnosed);
    VT missed detection increases sudden cardiac death risk. Mitigation: validation study
    demonstrates sensitivity >= 0.85 for AFib and VT, ensuring high detection rate.
    Prospective post-market surveillance monitors false negative patterns.

regulatory_references:
  - "FDA Guidance for Industry: Clinical Decision Support Software (May 2019)"
  - "FDA Guidance for Industry: Software Modifications to FDA-Regulated Medical Devices (July 2019)"
  - "FDA Guidance for Industry: De Novo Classification Request (January 2017)"
  - "FDA Guidance: Predetermined Change Control Plan (PCCP) - Draft (December 2024)"
  - "International Standard IEC 62304: Medical Device Software Lifecycle Processes"
  - "ASME/AAMI SW83: Software Engineering Standard for Medical Devices"
  - "FDA 510(k) Program Guidance: Demonstrating Substantial Equivalence for Software"
  - "NIST SP 800-53: Security and Privacy Controls for AI Systems"
