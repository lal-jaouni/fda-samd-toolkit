name: Quality Checks

on:
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC for mutation testing

jobs:
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src/fda_samd_toolkit --cov-report=term-missing --cov-fail-under=70

      - name: Generate HTML coverage report
        if: always()
        run: |
          pytest --cov=src/fda_samd_toolkit --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run ruff lint check
        run: |
          ruff check src tests

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run pyright type check
        run: |
          pyright src/fda_samd_toolkit/pccp src/fda_samd_toolkit/validation src/fda_samd_toolkit/model_cards src/fda_samd_toolkit/checklist

  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule'  # Only run on schedule, not on PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system mutmut

      - name: Run mutation testing on PCCP schemas
        run: |
          mutmut run --path src/fda_samd_toolkit/pccp/schemas.py --tests tests/pccp/ --timeout 10 || true

      - name: Run mutation testing on PCCP generator
        run: |
          mutmut run --path src/fda_samd_toolkit/pccp/generator.py --tests tests/pccp/ --timeout 10 || true

      - name: Run mutation testing on validation schemas
        run: |
          mutmut run --path src/fda_samd_toolkit/validation/schemas.py --tests tests/validation/ --timeout 10 || true

      - name: Run mutation testing on model card schemas
        run: |
          mutmut run --path src/fda_samd_toolkit/model_cards/schemas.py --tests tests/test_model_cards.py --timeout 10 || true

      - name: Run mutation testing on checklist schemas
        run: |
          mutmut run --path src/fda_samd_toolkit/checklist/schemas.py --tests tests/checklist/ --timeout 10 || true
