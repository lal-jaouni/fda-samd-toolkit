name: Deploy Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install mkdocs and dependencies
        run: |
          pip install mkdocs-material mkdocstrings[python] mkdocs-mermaid2-plugin pymdown-extensions mike

      - name: Build documentation
        run: |
          mkdocs build --strict

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v2
        with:
          path: './site'

  deploy:
    name: Deploy Documentation
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  validate:
    name: Validate Documentation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install mkdocs
        run: |
          pip install mkdocs-material mkdocstrings[python] mkdocs-mermaid2-plugin pymdown-extensions

      - name: Check documentation build
        run: |
          mkdocs build --strict

      - name: Validate markdown links
        run: |
          pip install markdown-link-check
          for file in docs/**/*.md; do
            markdown-link-check -c mkdocs.yml "$file" || true
          done

      - name: Comment on PR if validation fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Documentation build failed. Check the logs for details.'
            })

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run spell checker
        uses: crate-ci/typos@master
        with:
          files: docs/
          config: ./.typos.toml
